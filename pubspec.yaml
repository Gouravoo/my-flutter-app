name: medicine_tele_app
description: "AarogyaPlus - Telemedicine Flutter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  razorpay_flutter: ^1.3.7
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  zego_uikit_prebuilt_call: ^4.24.2
  zego_uikit_signaling_plugin: ^2.8.21
  flutter_ringtone_player: ^4.0.0+3
  vibration: ^3.1.3
  share_plus: ^12.0.0
  firebase_core: ^3.12.1
  permission_handler: ^12.0.3
  auto_start_flutter: ^1.4.0
  firebase_messaging: ^15.2.10
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
